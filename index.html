<html lang="ru">

<head>

<body>
  <section class="hero">
    <a class="hero__link" href="admin.html">журнал</a>
    <div class="hero__caption">
      <h1></h1>
      <p></p>
    </div>
  </section>

  <script>
    // ===== Visitor logging =====
    // Paste your Google Apps Script Web App URL (ends with /exec) below:
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyUz_EpGgTT6EHsWRzoQGp8IFJNewa0IPtRx2QEw-mtqGoubw8ufk7pIdE8KJT6Qnpnsw/exec"; // <-- REQUIRED

    (async function logVisit() {
      if (!SCRIPT_URL || SCRIPT_URL.indexOf("PASTE_") === 0) return; // not configured yet
      let ip = "";
      try {
        const r = await fetch("https://api.ipify.org?format=json");
        ip = (await r.json()).ip || "";
      } catch (e) { /* ip lookup failed; still log time */ }
      try {
        const params = new URLSearchParams({
          action: "log",
          ip: ip,
          t: new Date().toISOString(),
          ua: navigator.userAgent,
          ref: document.referrer || ""
        });
        // Fire-and-forget image beacon: no CORS preflight, never blocks the page.
        new Image().src = SCRIPT_URL + "?" + params.toString();
      } catch (e) { /* logging must never break the page */ }
    })();
  </script>
</body>

</html>
